# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/shopping_bot?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=QAZ21plm#
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Initialize data.sql on startup
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
spring.jpa.defer-datasource-initialization=true

# Server
server.port=8080

# Logging
logging.level.com.shoppingbot=DEBUG
logging.level.org.springframework.security=INFO

# App name
spring.application.name=AI Shopping Chat Bot
